<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <!-- Definitions for Gradients -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Background Glows -->
  <circle cx="200" cy="200" r="300" fill="url(#glow)" />
  <circle cx="1000" cy="200" r="300" fill="url(#glow)" />

  <!-- Abstract GNN Graph Network Representation -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5">
    <line x1="100" y1="100" x2="250" y2="150" />
    <line x1="250" y1="150" x2="200" y2="300" />
    <line x1="200" y1="300" x2="80" y2="250" />
    <line x1="80" y1="250" x2="100" y2="100" />
    <line x1="250" y1="150" x2="150" y2="200" />
    <line x1="150" y1="200" x2="80" y2="250" />
    <line x1="200" y1="300" x2="150" y2="200" />

    <line x1="1000" y1="100" x2="1120" y2="180" />
    <line x1="1120" y1="180" x2="1050" y2="320" />
    <line x1="1050" y1="320" x2="950" y2="280" />
    <line x1="950" y1="280" x2="920" y2="150" />
    <line x1="920" y1="150" x2="1000" y2="100" />
    <line x1="1000" y1="100" x2="980" y2="210" />
    <line x1="980" y1="210" x2="1050" y2="320" />
  </g>

  <!-- Highlight Nodes -->
  <g fill="url(#accent-grad)">
    <circle cx="100" cy="100" r="8" fill="#38bdf8" />
    <circle cx="250" cy="150" r="10" fill="#818cf8" />
    <circle cx="200" cy="300" r="7" fill="#ec4899" />
    <circle cx="80" cy="250" r="9" fill="#38bdf8" />
    <circle cx="150" cy="200" r="12" fill="#818cf8" />

    <circle cx="1000" cy="100" r="9" fill="#ec4899" />
    <circle cx="1120" cy="180" r="8" fill="#38bdf8" />
    <circle cx="1050" cy="320" r="11" fill="#818cf8" />
    <circle cx="950" cy="280" r="7" fill="#ec4899" />
    <circle cx="920" cy="150" r="10" fill="#38bdf8" />
    <circle cx="980" cy="210" r="6" fill="#818cf8" />
  </g>

  <!-- Typography -->
  <g text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif">
    <!-- Title -->
    <text x="600" y="190" font-size="58" font-weight="900" fill="url(#accent-grad)" letter-spacing="4px">
      AWESOME GNNs
    </text>
    <!-- Subtitle -->
    <text x="600" y="240" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="2px">
      Curated List of Graph Neural Networks Variants
    </text>
  </g>
</svg>
